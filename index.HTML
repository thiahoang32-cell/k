<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的專業簡介 - 受到 LinkedIn 的啟發</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f3f2ef;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background-color: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  }
  .header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
  }
  .header img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    margin-right: 20px;
  }
  .header h1 {
    font-size: 28px;
    margin-top: 0;
  }
  .header p {
    font-size: 16px;
    color: #666;
  }
  .contact-info {
    margin-bottom: 20px;
  }
  .contact-info a {
    text-decoration: none;
    color: #0073b1;
  }
  .about-me {
    margin-bottom: 30px;
  }
  .about-me h2 {
    font-size: 20px;
    margin-top: 0;
  }
  .experience {
    margin-bottom: 30px;
  }
  .experience h2 {
    font-size: 20px;
    margin-top: 0;
  }
  .experience-item {
    margin-bottom: 20px;
  }
  .experience-item h3 {
    font-size: 18px;
    margin-top: 0;
  }
  .experience-item p {
    font-size: 14px;
    color: #666;
  }
  .skills {
    margin-bottom: 30px;
  }
  .skills h2 {
    font-size: 20px;
    margin-top: 0;
  }
  .skills ul {
    list-style: none;
    padding: 0;
  }
  .skills li {
    font-size: 14px;
    background-color: #eee;
    padding: 5px 10px;
    border-radius: 5px;
    margin-right: 10px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="mujic.jpg" alt="您的姓名">
      <div>
        <h1>Hwag thia</h1>
        <p>您的職稱/專業領域</p>
      </div>
    </div>

    <div class="contact-info">
      <a href="mailto:你的電子郵件">電子郵件</a> |
      <a href="你的 LinkedIn 網址">LinkedIn</a> |
      <a href="你的個人網站/作品集">個人網站</a>
    </div>

    <div class="about-me">
      <h2>關於我</h2>
      <p>撰寫一段簡短的段落，介紹您的專業背景、技能、熱情和職業目標。</p>
    </div>

    <div class="experience">
      <h2>工作經驗</h2>
      <div class="experience-item">
        <h3>職稱, 公司名稱</h3>
        <p>起訖日期</p>
        <p>簡述您在該職位的主要職責、成就和所使用的技能。</p>
      </div>
      </div>

    <div class="skills">
      <h2>技能</h2>
      <ul>
        <li>技能 1</li>
        <li>技能 2</li>
        <li>技能 3</li>
        </ul>
    </div>
  </div>
</body>
</html>
